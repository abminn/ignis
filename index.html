<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Games Launcher</title>
    <style>
        /* Reset & Layout */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* Background Video */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 2; transition: opacity 0.5s ease; }
        
        /* Interactive Start Overlay (Arms the Anti-Close system) */
        #interaction-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; color: white; cursor: pointer; text-align: center;
        }

        #loader { 
            font-weight: 900; font-size: 3rem; text-transform: uppercase; letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5); margin-bottom: 20px;
        }

        .click-prompt { font-size: 1.2rem; opacity: 0.8; letter-spacing: 2px; }

        /* Iframe */
        iframe { border: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10; display: none; background: transparent; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://files.catbox.moe/kgwbtv.mp4" type="video/mp4">
    </video>
    
    <div class="overlay" id="ui-overlay"></div>

    <div id="interaction-layer">
        <div id="loader">Nexus</div>
        <div class="click-prompt" id="status-text">Click anywhere to launch</div>
    </div>

    <iframe id="app-frame" title="Game Content"></iframe>

    <script>
        const GITHUB_URL = 'https://cdn.jsdelivr.net/gh/abminn/Nexus-Games@latest/nexus.html';
        const BASE_PATH = 'https://cdn.jsdelivr.net/gh/abminn/Nexus-Games@latest/';
        
        const frame = document.getElementById('app-frame');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('status-text');
        const interactor = document.getElementById('interaction-layer');
        const video = document.getElementById('bg-video');
        const overlay = document.getElementById('ui-overlay');

        // Initialize only after a click to "arm" the browser's beforeunload system
        interactor.addEventListener('click', () => {
            statusText.innerText = "LOADING...";
            initLauncher();
        }, { once: true });

        async function initLauncher() {
            try {
                const response = await fetch(GITHUB_URL, { cache: "no-store" });
                if (!response.ok) throw new Error('Network error');
                const html = await response.text();
                
                // Inject Base Path
                const baseTag = `<base href="${BASE_PATH}">`;
                const injectedHtml = html.includes('<head>') 
                    ? html.replace('<head>', `<head>${baseTag}`) 
                    : baseTag + html;

                const doc = frame.contentDocument || frame.contentWindow.document;
                doc.open();
                doc.write(injectedHtml);
                doc.close();
                
                frame.onload = () => {
                    interactor.style.opacity = '0';
                    overlay.style.opacity = '0';
                    
                    setTimeout(() => {
                        interactor.style.display = 'none';
                        video.style.display = 'none';
                        overlay.style.display = 'none';
                        frame.style.display = 'block';
                        // Focus the frame so key presses work immediately
                        frame.focus();
                    }, 500);
                };

                startSystems();

            } catch (err) {
                loader.innerHTML = 'ERROR';
                statusText.innerText = 'Could not connect to GitHub';
                console.error(err);
            }
        }

        function startSystems() {
            // 1. Mirror Title
            let lastTitle = "";
            setInterval(() => {
                try {
                    const iframeTitle = frame.contentDocument.title;
                    if (iframeTitle && iframeTitle !== lastTitle) {
                        document.title = iframeTitle;
                        lastTitle = iframeTitle;
                    }
                } catch (e) {
                    if (frame.title && frame.title !== lastTitle) {
                        document.title = frame.title;
                        lastTitle = frame.title;
                    }
                }
            }, 250);

            // 2. THE ANTI-CLOSE SYSTEM
            // This is the strongest implementation possible in modern browsers
            window.addEventListener('beforeunload', function (e) {
                // Cancel the event
                e.preventDefault();
                // Chrome requires returnValue to be set
                e.returnValue = '';
                // Standard for most browsers
                return '';
            });

            // 3. Fallback: If they click inside the iframe, ensure the parent stays "active"
            window.addEventListener('blur', () => {
                if (document.activeElement === frame) {
                    console.log("Input focused on game frame.");
                }
            });
        }
    </script>
</body>
</html>
